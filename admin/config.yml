backend:
  name: github
  repo: DevSandrine/EduSphere
  branch: main


media_folder: "images"
public_folder: "/images"


collections:

  - name: "cours"
    label: "Cours"
    folder: "content/cours"
    create: true
    slug: "{{slug}}"

    fields:

      - label: "Titre"
        name: "title"
        widget: "string"


      - label: "Catégorie"
        name: "category"
        widget: "string"


      - label: "Image"
        name: "image"
        widget: "image"
        required: false


      - label: "Contenu du cours"
        name: "body"
        widget: "markdown"
