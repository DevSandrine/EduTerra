backend:
  name: github
  repo: devsandrine/EduTerra
  branch: main
  base_url: https://eduterra.pages.dev
  auth_endpoint: oauth

media_folder: "images"
public_folder: "/images"

collections:
  - name: cours
    label: Cours
    folder: content/cours
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Titre"
        name: "title"
        widget: "string"

      - label: "Catégorie"
        name: "category"
        widget: "string"

      - label: "Contenu"
        name: "body"
        widget: "markdown"
